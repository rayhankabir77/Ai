name: Build EXE
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Export EXE
        uses: its-kumar-pritish/html-to-exe-action@v1.0
        with:
          html_path: 'index.html'
          app_name: 'EndlessCityRacer'

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: Windows-Build
          path: output/
          
