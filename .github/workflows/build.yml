name: Build All Platforms
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Build Windows
        run: nativefier --name "EndlessCityRacer" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html"

      - name: Build macOS
        run: nativefier --name "EndlessCityRacer" --platform "mac" --arch "x64" "file://${{ github.workspace }}/index.html"

      - name: Build Linux
        run: nativefier --name "EndlessCityRacer" --platform "linux" --arch "x64" "file://${{ github.workspace }}/index.html"

      - name: Upload All Builds
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Platform-Builds
          path: ./*-win32-x64/ , ./*-darwin-x64/ , ./*-linux-x64/
